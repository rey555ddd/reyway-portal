<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笙闆的秘密園區 — REYWAY</title>
<meta name="description" content="Build Tools. Drive Growth.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================
   REYWAY Portal v3
   Real images / OKLCH / micro-animations / RWD
   ============================================ */
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#050508;
  --surface:#0a0a12;
  --card:#0e0e18;
  --border:oklch(0.22 0.01 270);
  --accent:oklch(0.55 0.2 270);
  --gold:oklch(0.72 0.12 80);
  --emerald:oklch(0.65 0.17 160);
  --text:oklch(0.87 0.005 270);
  --text-muted:oklch(0.45 0.01 270);
  --white:oklch(0.97 0 0);
  --radius:16px;
  --radius-sm:10px;
  --radius-lg:24px;
  --ease-out:cubic-bezier(.22,1,.36,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
}

html{scroll-behavior:smooth}
body{
  font-family:'Inter','Noto Sans TC',sans-serif;
  background:var(--bg);color:var(--text);
  overflow-x:hidden;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ===== AMBIENT ===== */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);will-change:transform}
.orb-1{width:50vw;height:50vw;top:-20%;left:-15%;background:radial-gradient(circle,rgba(99,102,241,.08),transparent 65%);animation:drift1 30s ease-in-out infinite}
.orb-2{width:40vw;height:40vw;bottom:-15%;right:-10%;background:radial-gradient(circle,rgba(139,92,246,.06),transparent 65%);animation:drift2 25s ease-in-out infinite}
.orb-3{width:30vw;height:30vw;top:40%;left:50%;background:radial-gradient(circle,rgba(212,168,83,.04),transparent 60%);animation:drift3 35s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4%,6%) scale(1.05)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5%,-3%) scale(1.08)}}
@keyframes drift3{0%,100%{transform:translate(-50%,0) scale(1)}50%{transform:translate(-45%,5%) scale(1.1)}}

.noise{
  position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ===== PAGE SYSTEM ===== */
.page{
  position:relative;z-index:2;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 24px;
  transition:opacity .5s var(--ease-out),transform .5s var(--ease-out);
}
.page.hidden{display:none}
.page.fade-out{opacity:0;transform:translateY(12px)}

/* ===== AVATAR ===== */
.avatar-container{position:relative;margin-bottom:36px}
.avatar-ring{
  position:absolute;inset:-6px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--accent),#8b5cf6,var(--gold),var(--accent));
  animation:ring-spin 10s linear infinite;opacity:.8;
}
.avatar-ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg)}
@keyframes ring-spin{to{transform:rotate(360deg)}}
.avatar{
  width:140px;height:140px;border-radius:50%;
  object-fit:cover;position:relative;z-index:1;
  border:4px solid var(--bg);
  transition:transform .6s var(--ease-spring);
}
.avatar:hover{transform:scale(1.06)}

/* ===== TYPOGRAPHY ===== */
.title{
  font-size:clamp(32px,6vw,48px);font-weight:900;
  color:var(--white);letter-spacing:-1.5px;margin-bottom:12px;text-align:center;
  background:linear-gradient(135deg,var(--white) 40%,oklch(0.75 0.1 270));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.private-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 18px;border-radius:20px;
  border:1px solid var(--border);color:var(--text-muted);
  font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  backdrop-filter:blur(8px);background:rgba(255,255,255,.02);margin-bottom:48px;
}
.private-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:oklch(0.65 0.2 145);animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.tagline{
  font-size:clamp(16px,3vw,22px);font-weight:300;
  color:var(--text);letter-spacing:3px;margin-bottom:72px;text-align:center;
}
.tagline em{font-style:normal;color:oklch(0.72 0.12 80);font-weight:600}

/* ===== TOOL CARDS (with real images) ===== */
.sections{width:100%;max-width:680px}
.section-label{
  font-size:10px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:4px;
  margin-bottom:14px;padding-left:6px;text-align:left;
}

.tool-row{display:flex;gap:14px;margin-bottom:44px}

.tool-card{
  flex:1;position:relative;overflow:hidden;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);
  text-decoration:none;color:inherit;cursor:pointer;
  transition:all .45s var(--ease-out);
}
.tool-card .card-img{
  width:100%;height:180px;
  object-fit:cover;
  display:block;
  opacity:.85;
  transition:all .5s var(--ease-out);
}
.tool-card:hover .card-img{opacity:1;transform:scale(1.04)}
.tool-card .card-img-wrap{overflow:hidden;border-radius:var(--radius-lg) var(--radius-lg) 0 0}

.tool-card .card-body{padding:20px 24px 24px;text-align:center}
.tool-card .name{font-size:17px;font-weight:700;color:var(--white);margin-bottom:5px}
.tool-card .desc{font-size:11px;color:var(--text-muted);font-weight:400;line-height:1.5}

/* Shimmer line */
.tool-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  transition:opacity .4s;opacity:0;
}
.tool-card:hover::after{opacity:1}
.tool-card:hover{transform:translateY(-6px);box-shadow:0 24px 64px rgba(0,0,0,.4)}

/* CleanClean variant — brand cyan #61D0DF */
.tool-card.cc::after{background:linear-gradient(90deg,transparent,#61D0DF,transparent)}
.tool-card.cc:hover{border-color:#61D0DF;box-shadow:0 24px 64px rgba(97,208,223,.12)}

.tool-card .card-logo{
  position:absolute;top:14px;left:16px;
  height:28px;opacity:.85;z-index:2;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));
}

/* Eagle variant */
.tool-card.ego::after{background:linear-gradient(90deg,transparent,oklch(0.72 0.12 80),transparent)}
.tool-card.ego:hover{border-color:oklch(0.6 0.1 80);box-shadow:0 24px 64px rgba(212,168,83,.08)}

/* ===== SUB-PAGE ===== */
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--text-muted);font-size:13px;font-weight:500;
  cursor:pointer;padding:8px 16px;
  border-radius:var(--radius-sm);border:1px solid transparent;
  transition:all .3s var(--ease-out);
  margin-bottom:48px;background:none;text-decoration:none;
}
.back-btn:hover{color:var(--accent);border-color:var(--border);background:rgba(99,102,241,.04)}
.back-btn svg{transition:transform .3s var(--ease-out)}
.back-btn:hover svg{transform:translateX(-3px)}

.sub-header{text-align:center;margin-bottom:56px}
.sub-header .badge{
  display:inline-block;padding:5px 16px;border-radius:var(--radius-sm);
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  background:rgba(212,168,83,.1);color:oklch(0.72 0.12 80);margin-bottom:16px;
}
.sub-header h2{font-size:clamp(26px,5vw,36px);font-weight:900;color:var(--white);margin-bottom:8px}
.sub-header p{color:var(--text-muted);font-size:14px}

.sub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:860px;margin:0 auto}

.sub-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);
  text-decoration:none;color:inherit;position:relative;overflow:hidden;
  cursor:pointer;transition:all .45s var(--ease-out);
}
.sub-card .card-img-wrap{overflow:hidden;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.sub-card .card-img{
  width:100%;height:160px;object-fit:cover;display:block;
  opacity:.8;transition:all .5s var(--ease-out);
}
.sub-card:hover .card-img{opacity:1;transform:scale(1.04)}

.sub-card .card-body{padding:18px 16px 22px;text-align:center}

.sub-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,oklch(0.72 0.12 80),transparent);
  opacity:0;transition:opacity .35s;
}
.sub-card:hover{transform:translateY(-6px);border-color:oklch(0.5 0.08 80);box-shadow:0 20px 56px rgba(0,0,0,.35)}
.sub-card:hover::after{opacity:1}

.sub-card h3{font-size:16px;font-weight:700;color:var(--white);margin-bottom:5px}
.sub-card .card-desc{font-size:11px;color:var(--text-muted);line-height:1.5}

.status-tag{
  display:inline-flex;align-items:center;gap:4px;margin-top:12px;
  padding:3px 12px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.5px;
}
.status-live{background:rgba(74,222,128,.08);color:oklch(0.75 0.18 150)}
.status-live::before{content:'';width:5px;height:5px;border-radius:50%;background:oklch(0.75 0.18 150);animation:pulse-dot 2s ease-in-out infinite}
.status-dev{background:rgba(251,191,36,.08);color:oklch(0.8 0.15 85)}

/* ===== FOOTER ===== */
.footer{margin-top:auto;padding:40px 0 24px;text-align:center;color:var(--text-muted);font-size:10px;letter-spacing:2px;text-transform:uppercase}

/* ===== ENTRANCE ANIMATIONS ===== */
@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fade-up .7s var(--ease-out) both}
.delay-1{animation-delay:.1s}
.delay-2{animation-delay:.2s}
.delay-3{animation-delay:.35s}
.delay-4{animation-delay:.5s}
.delay-5{animation-delay:.65s}

/* ===== RWD ===== */
@media(max-width:768px){
  .sub-grid{grid-template-columns:1fr;max-width:360px}
}
@media(max-width:640px){
  .page{padding:48px 20px}
  .avatar{width:110px;height:110px}
  .tool-row{flex-direction:column}
  .tool-card .card-img{height:140px}
  .sub-card .card-img{height:120px}
}
</style>
</head>
<body>

<div class="ambient">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="noise"></div>

<!-- ===== HOME ===== -->
<div id="home" class="page">
  <div class="avatar-container animate-in">
    <div class="avatar-ring"></div>
    <img class="avatar" src="avatar.jpg" alt="笙闆" onerror="this.style.background='linear-gradient(135deg,#6366f1,#8b5cf6)'">
  </div>

  <h1 class="title animate-in delay-1">笙闆的秘密園區</h1>
  <div class="private-badge animate-in delay-2">非邀請請勿使用</div>
  <div class="tagline animate-in delay-3"><em>Build Tools.</em> Drive Growth.</div>

  <div class="sections">
    <div class="section-label animate-in delay-3" style="color:#61D0DF">淨淨 CleanClean</div>
    <div class="tool-row animate-in delay-4">
      <a class="tool-card cc" href="https://cleanclean.reyway.com" target="_blank">
        <img class="card-logo" src="logo-cleanclean.png" alt="淨淨 Logo" onerror="this.style.display='none'">
        <div class="card-img-wrap">
          <img class="card-img" src="icon-cleanclean.png" alt="淨淨 CleanClean">
        </div>
        <div class="card-body">
          <div class="name">行銷神隊友</div>
          <div class="desc">文案 × 策略 × 數據分析</div>
        </div>
      </a>
    </div>

    <div class="section-label animate-in delay-4">伊果國際集團 Eagle Group</div>
    <div class="tool-row animate-in delay-5">
      <div class="tool-card ego" onclick="navigate('ego')">
        <div class="card-img-wrap">
          <img class="card-img" src="icon-eagle-group.png" alt="伊果國際集團">
        </div>
        <div class="card-body">
          <div class="name">進入工具庫</div>
          <div class="desc">精品 × 餐飲 × 酒店</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">REYWAY &copy; 2026</div>
</div>

<!-- ===== EGO SUB-PAGE ===== -->
<div id="ego" class="page hidden">
  <div style="width:100%;max-width:860px">
    <button class="back-btn animate-in" onclick="navigate('home')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 2L4 8l6 6"/></svg>
      返回秘密園區
    </button>

    <div class="sub-header">
      <div class="badge animate-in delay-1">EAGLE GROUP</div>
      <h2 class="animate-in delay-2">伊果國際集團</h2>
      <p class="animate-in delay-2">選擇事業體，進入專屬工具</p>
    </div>

    <div class="sub-grid">
      <a class="sub-card animate-in delay-3" href="https://eagle.reyway.com" target="_blank">
        <div class="card-img-wrap">
          <img class="card-img" src="icon-eagle-shopping.png" alt="伊果精品">
        </div>
        <div class="card-body">
          <h3>伊果精品</h3>
          <div class="card-desc">Eagle Shopping<br>精品圖文產生器</div>
          <span class="status-tag status-dev">部署中</span>
        </div>
      </a>

      <a class="sub-card animate-in delay-4" href="https://suan7.reyway.com" target="_blank">
        <div class="card-img-wrap">
          <img class="card-img" src="icon-sour7.png" alt="酸小七">
        </div>
        <div class="card-body">
          <h3>酸小七</h3>
          <div class="card-desc">Sour 7<br>社群小編神隊友</div>
          <span class="status-tag status-dev">部署中</span>
        </div>
      </a>

      <a class="sub-card animate-in delay-5" href="https://club.reyway.com" target="_blank">
        <div class="card-img-wrap">
          <img class="card-img" src="icon-chinahotel.png" alt="帝豪 / 中國城">
        </div>
        <div class="card-body">
          <h3>帝豪 / 中國城</h3>
          <div class="card-desc">China Hotel<br>酒店行銷工具組</div>
          <span class="status-tag status-live">已上線</span>
        </div>
      </a>
    </div>
  </div>

  <div class="footer" style="margin-top:80px">REYWAY &copy; 2026</div>
</div>

<script>
function navigate(targetId){
  const pages=document.querySelectorAll('.page:not(.hidden)');
  const target=document.getElementById(targetId);
  if(!target) return;
  pages.forEach(p=>p.classList.add('fade-out'));
  setTimeout(()=>{
    document.querySelectorAll('.page').forEach(p=>{p.classList.add('hidden');p.classList.remove('fade-out')});
    target.classList.remove('hidden');
    window.scrollTo({top:0});
    target.querySelectorAll('.animate-in').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation=''});
  },400);
}
</script>
</body>
</html>
