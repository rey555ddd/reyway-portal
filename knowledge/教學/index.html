<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教學 · 網頁知識庫 · REYWAY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F4F0;--surface:#FFF;--text:#1C1C1E;--text-2:#6E6E73;--text-3:#AEAEB2;--border:rgba(0,0,0,0.06);--shadow:0 2px 16px rgba(0,0,0,0.06),0 1px 4px rgba(0,0,0,0.04);--shadow-hover:0 8px 32px rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.06);--radius-sm:12px}
body{font-family:"Inter","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:0 20px}
.topbar{position:sticky;top:0;z-index:10;background:rgba(245,244,240,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 0}
.topbar-inner{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-2);text-decoration:none;padding:6px 14px;border-radius:100px;background:var(--surface);box-shadow:var(--shadow);white-space:nowrap;flex-shrink:0}
.back-btn:hover{box-shadow:var(--shadow-hover)}
.topbar h1{font-size:1rem;font-weight:700;flex:1}
.count{font-size:0.8rem;color:var(--text-3);flex-shrink:0}
.search-wrap{padding:24px 0 0}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:100px;padding:11px 20px;box-shadow:var(--shadow)}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:0.9rem;font-family:inherit;color:var(--text)}
.search-box input::placeholder{color:var(--text-3)}
.list{display:flex;flex-direction:column;gap:10px;padding:20px 0 60px}
.kb-card{background:var(--surface);border-radius:var(--radius-sm);padding:18px 20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:box-shadow .2s,transform .2s}
.kb-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.kb-card.hidden{display:none}
.kb-icon{font-size:1.25rem;width:36px;text-align:center;flex-shrink:0}
.kb-body{flex:1;min-width:0}
.kb-title{font-size:0.92rem;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kb-date{font-size:0.75rem;color:var(--text-3)}
.kb-arrow{font-size:0.95rem;color:var(--text-3);flex-shrink:0}
.empty{text-align:center;padding:60px 20px;font-size:0.88rem;color:var(--text-3);display:none}
#auth-gate{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center}
#auth-gate.hidden{display:none}
</style>
</head>
<body>
<div id="auth-gate"><div style="color:#AEAEB2;font-size:.9rem">驗證中…</div></div>
<div class="topbar"><div class="wrap topbar-inner">
  <a class="back-btn" href="/knowledge/">← 知識庫</a>
  <h1>📖 教學</h1>
  <div class="count" id="count"></div>
</div></div>
<div class="wrap">
  <div class="search-wrap"><div class="search-box">
    <span style="color:#AEAEB2">🔍</span>
    <input id="q" type="text" placeholder="搜尋…" oninput="filter()">
  </div></div>
  <div class="list" id="list">
    <a class="kb-card" href="ai-stages.html" target="_blank" data-title="AI 的五個發展階段">
      <div class="kb-icon">🧠</div>
      <div class="kb-body">
        <div class="kb-title">AI 的五個發展階段</div>
        <div class="kb-date">2026-04-24</div>
      </div>
      <div class="kb-arrow">→</div>
    </a>
    <a class="kb-card" href="ai-team-training.html" target="_blank" data-title="AI 軍團完整教學">
      <div class="kb-icon">🤖</div>
      <div class="kb-body">
        <div class="kb-title">AI 軍團完整教學</div>
        <div class="kb-date">2026-04-26</div>
      </div>
      <div class="kb-arrow">→</div>
    </a>
    <a class="kb-card" href="manager-training.html" target="_blank" data-title="主管版 Claude AI Agent 教育訓練 內部">
      <div class="kb-icon">👔</div>
      <div class="kb-body">
        <div class="kb-title">主管版 AI Agent 教育訓練（內部版）</div>
        <div class="kb-date">2026-04-27</div>
      </div>
      <div class="kb-arrow">→</div>
    </a>
    <a class="kb-card" href="agent-training.html" target="_blank" data-title="AI Agent 完整教學 通用版 公開">
      <div class="kb-icon">🌐</div>
      <div class="kb-body">
        <div class="kb-title">用 AI Agent 打造你的智能工作夥伴（通用版）</div>
        <div class="kb-date">2026-04-27 · 可公開分享</div>
      </div>
      <div class="kb-arrow">→</div>
    </a>
    <a class="kb-card" href="staff-training.html" target="_blank" data-title="全體員工 AI 工具使用教學">
      <div class="kb-icon">👥</div>
      <div class="kb-body">
        <div class="kb-title">全體員工 AI 工具使用教學</div>
        <div class="kb-date">2026-04-24</div>
      </div>
      <div class="kb-arrow">→</div>
    </a>
    <a class="kb-card" href="talk-to-ai.html" target="_blank" data-title="如何把 AI 用得更好 員工版溝通教學">
      <div class="kb-icon">💬</div>
      <div class="kb-body">
        <div class="kb-title">如何把 AI 用得更好（員工溝通教學）</div>
        <div class="kb-date">2026-04-29 · 全員必讀</div>
      </div>
      <div class="kb-arrow">→</div>
    </a>
    <a class="kb-card" href="claude-toolbox.html" target="_blank" data-title="Claude Code 工具箱完整指南 14 個官方資料夾 進階教學">
      <div class="kb-icon">🛠</div>
      <div class="kb-body">
        <div class="kb-title">Claude Code 工具箱完整指南（14 個官方資料夾、新手版）</div>
        <div class="kb-date">2026-04-30 · 進階教學</div>
      </div>
      <div class="kb-arrow">→</div>
    </a>

  </div>
  <div id="empty" class="empty">沒有符合的頁面</div>
</div>
<script>
(function(){
  try{const s=JSON.parse(localStorage.getItem("reyway_gauth")||"null");if(s&&s.expiry>Date.now()){document.getElementById("auth-gate").classList.add("hidden");upd();return;}}catch(e){}
  window.location.href="/";
})();
function filter(){
  const q=document.getElementById("q").value.toLowerCase();
  let v=0;
  document.querySelectorAll("#list .kb-card").forEach(c=>{
    const show=!q||c.dataset.title.toLowerCase().includes(q);
    c.classList.toggle("hidden",!show);if(show)v++;
  });
  document.getElementById("empty").style.display=v===0?"block":"none";
  upd();
}
function upd(){
  const v=document.querySelectorAll("#list .kb-card:not(.hidden)").length;
  const t=document.querySelectorAll("#list .kb-card").length;
  document.getElementById("count").textContent=v===t?t+" 個頁面":v+"/"+t;
}
</script>
</body></html>
